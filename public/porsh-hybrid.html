<!DOCTYPE html>
<html lang="en">
<!--
  PROYECTO: Porsh Messenger (Companion of porshi.vercel.app)
  BUILD: High-Performance Hybrid Build for AppCreator24
  AUTHOR: Senior Product Designer
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Porsh Messenger</title>
    <style>
        /* CSS3 VARIABLES - PORSHI ECOSYSTEM */
        :root {
            --porshi-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --porshi-violet: #764ba2;
            --bg-canvas: #f0f2f5;
            --bubble-sent: #764ba2;
            --bubble-received: #e4e6eb;
            --text-main: #050505;
            --text-white: #ffffff;
            --text-dim: #65676b;
            --online-green: #31a24c;
        }

        /* NATIVE APP RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents browser scroll for native feel */
            background-color: var(--bg-canvas);
            touch-action: manipulation;
        }

        #app-window {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            position: relative;
        }

        /* STICKY HEADER */
        header {
            background: var(--porshi-gradient);
            padding: 12px 18px;
            padding-top: env(safe-area-inset-top, 12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.25);
        }

        .identity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .p-logo {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            position: relative;
        }

        .status-badge {
            width: 13px;
            height: 13px;
            background: var(--online-green);
            border-radius: 50%;
            position: absolute;
            bottom: 1px;
            right: 1px;
            border: 2px solid #705cb6;
        }

        .title-group h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .title-group span {
            font-size: 0.7rem;
            opacity: 0.9;
            display: block;
            font-weight: 500;
        }

        /* SCROLLABLE CHAT AREA */
        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f9f9fb;
            /* Scroll smooth logic */
            scroll-behavior: smooth;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.92rem;
            line-height: 1.45;
            position: relative;
            animation: slideUp 0.35s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-bubble.out {
            align-self: flex-end;
            background: var(--porshi-gradient);
            color: var(--text-white);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.2);
        }

        .msg-bubble.in {
            align-self: flex-start;
            background: var(--bubble-received);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .timestamp {
            font-size: 0.65rem;
            margin-top: 4px;
            display: block;
            opacity: 0.7;
            text-align: right;
        }

        /* TYPING ANIMATION */
        .typing-box {
            align-self: flex-start;
            background: var(--bubble-received);
            padding: 10px 16px;
            border-radius: 18px;
            display: none;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* FIXED BOTTOM INPUT */
        .composer {
            padding: 10px 14px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        }

        #msg-input {
            flex: 1;
            border: none;
            background: #f0f2f5;
            padding: 12px 18px;
            border-radius: 24px;
            outline: none;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: background 0.2s;
        }

        #msg-input:focus {
            background: #e4e6eb;
        }

        #send-action {
            background: var(--porshi-gradient);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(118, 75, 162, 0.3);
        }

        #send-action:active {
            transform: scale(0.92);
            box-shadow: 0 2px 4px rgba(118, 75, 162, 0.2);
        }

        .icon-send {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* SCROLLBAR CUSTOMIZATION */
        #chat-scroller::-webkit-scrollbar { width: 4px; }
        #chat-scroller::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }

    </style>
</head>
<body>

<div id="app-window">
    <header>
        <div class="identity">
            <div class="p-logo">
                P
                <div class="status-badge"></div>
            </div>
            <div class="title-group">
                <h1>Porsh</h1>
                <span>Messenger Active • porshi.vercel.app</span>
            </div>
        </div>
        <div class="options">
            <svg style="width:24px; height:24px; opacity:0.8" viewBox="0 0 24 24"><path fill="currentColor" d="M12,16A2,2 0 0,1 14,18A2,2 0 0,1 12,20A2,2 0 0,1 10,18A2,2 0 0,1 12,16M12,10A2,2 0 0,1 14,12A2,2 0 0,1 12,14A2,2 0 0,1 10,12A2,2 0 0,1 12,10M12,4A2,2 0 0,1 14,6A2,2 0 0,1 12,8A2,2 0 0,1 10,6A2,2 0 0,1 12,4Z"/></svg>
        </div>
    </header>

    <main id="chat-scroller">
        <!-- Messages will render here -->
    </main>

    <div class="typing-box" id="typing-ui">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <footer class="composer">
        <input type="text" id="msg-input" placeholder="Compose message..." autocomplete="off">
        <button id="send-action">
            <svg class="icon-send" viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
        </button>
    </footer>
</div>

<script>
    /*
      PORSH MESSENGER ENGINE
      Logic for Local Persistence & Hybrid Integration
    */

    const API_URL = 'https://porshi.vercel.app/api/messenger'; // SYNC WITH YOUR VERCEL BACKEND
    const CHAT_STORAGE_KEY = 'porsh_chat_history_v1';

    const scroller = document.getElementById('chat-scroller');
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-action');
    const typingUI = document.getElementById('typing-ui');

    // 1. DATA INITIALIZATION
    let messages = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY)) || [
        { type: 'in', text: 'স্বাগতম পর্শি মেসেন্জারে! আপনি এখান থেকে সরাসরি চ্যাট করতে পারবেন।', time: getNow() }
    ];

    // 2. RENDERER
    function renderMessages() {
        scroller.innerHTML = '';
        messages.forEach(msg => {
            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${msg.type}`;
            bubble.innerHTML = `${msg.text} <span class="timestamp">${msg.time}</span>`;
            scroller.appendChild(bubble);
        });
        scrollToBottom();
    }

    function scrollToBottom() {
        scroller.scrollTop = scroller.scrollHeight;
    }

    function getNow() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // 3. PERSISTENCE
    function saveChat() {
        localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(messages));
    }

    // 4. HYBRID SEND LOGIC
    async function sendMessage() {
        const text = input.value.trim();
        if(!text) return;

        // UI Update (Optimistic)
        const newMsg = { type: 'out', text, time: getNow() };
        messages.push(newMsg);
        input.value = '';
        renderMessages();
        saveChat();

        // Hybrid API Sync (Placeholder)
        try {
            /* 
               UNCOMMENT BELOW TO CONNECT TO YOUR VERCEL SITE:
               
               const response = await fetch(API_URL, {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify(newMsg)
               });
               const data = await response.json();
            */
            
            // Simulation of AI/Partner Response
            simulateResponse();
        } catch (e) {
            console.warn('API Sync paused. Using local mode.', e);
        }
    }

    // 5. UX REFINEMENTS (Typing Effect)
    function simulateResponse() {
        setTimeout(() => {
            typingUI.style.display = 'flex';
            scrollToBottom();
            
            setTimeout(() => {
                typingUI.style.display = 'none';
                messages.push({ 
                    type: 'in', 
                    text: 'আপনার মেসেজটি সফলভাবে পৌঁছেছে। ধন্যবাদ!', 
                    time: getNow() 
                });
                renderMessages();
                saveChat();
            }, 1800);
        }, 800);
    }

    // 6. EVENT BINDING
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });

    // Handle focus scroll fix for mobile keyboards
    input.addEventListener('focus', () => {
        setTimeout(scrollToBottom, 300);
    });

    // BOOT
    renderMessages();

</script>

</body>
</html>
